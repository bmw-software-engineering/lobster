incompatible_flags:
  "--incompatible_config_setting_private_default_visibility":
    - 8.x
  "--incompatible_disable_starlark_host_transitions":
    - 8.x
  "--incompatible_disable_native_repo_rules":
    - 8.x
  "--incompatible_strict_action_env":
    - 8.x

matrix:
  platform:
    - ubuntu2204
    - macos
    - windows
  bazel:
    - 8.x

# Verify all lobster module entry points build correctly across all supported platforms before release.
tasks:
  run_test_module:
    build_flags:
      - "--@@rules_python+//python/config_settings:python_version=3.9"  # ← explicit Python version
    build_targets:
      - "@lobster//:lobster"
