name: Publish to BCR

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      registry_fork:
        required: false
        type: string
        default: bmw-software-engineering/bazel-central-registry
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag being released
        required: true
        type: string
      registry_fork:
        description: GitHub fork used to open the BCR PR (owner/repo)
        required: false
        type: string
        default: bmw-software-engineering/bazel-central-registry

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.2.0
    with:
      tag_name: ${{ inputs.tag_name }}
      registry_fork: ${{ inputs.registry_fork }}
      draft: true
      attest: true
      tag_prefix: "lobster-"
    permissions:
      contents: write
      id-token: write
      attestations: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
